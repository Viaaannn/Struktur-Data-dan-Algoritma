<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - KOSTHINK</title>
    <style>
        body { 
            margin: 0; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            color: #334155; 
        }
        .auth-card {
            background: white;
            padding: 48px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid #cbd5e1;
        }
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
        }
        h2 { margin: 0 0 8px 0; font-size: 24px; font-weight: 800; color: #0f172a; letter-spacing: -0.5px; }
        p.subtitle { color: #64748b; font-size: 14px; margin-bottom: 32px; font-weight: 500; }
        
        /* Form Styling */
        form { text-align: left; }
        form p { margin-bottom: 20px; font-size: 14px; font-weight: 600; color: #1e293b; }
        form input[type="text"], 
        form input[type="password"], 
        form input[type="email"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            margin-top: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
            background: #f8fafc;
        }
        form input:focus { border-color: #0f172a; background: white; box-shadow: 0 0 0 3px rgba(15,23,42,0.1); }
        
        .helptext { display: block; font-size: 12px; color: #94a3b8; margin-top: 6px; font-weight: normal; line-height: 1.4; }
        ul.errorlist { color: #ef4444; font-size: 13px; padding-left: 20px; margin-top: 6px; background: #fef2f2; padding: 10px 10px 10px 30px; border-radius: 6px; }
        ul { font-size: 13px; color: #64748b; padding-left: 20px; margin-top: 10px; font-weight: normal; line-height: 1.5; }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(15,23,42,0.1);
        }
        .btn-submit:hover { background: #1e293b; transform: translateY(-1px); box-shadow: 0 10px 15px -3px rgba(15,23,42,0.15); }
        
        .login-link { margin-top: 24px; font-size: 14px; color: #64748b; display: block; font-weight: 500; }
        .login-link a { color: #2563eb; font-weight: 600; text-decoration: none; }
        .login-link a:hover { text-decoration: underline; color: #1d4ed8; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo-container">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                <polyline points="2 17 12 22 22 17"></polyline>
                <polyline points="2 12 12 17 22 12"></polyline>
            </svg>
        </div>
        
        <h2>Buat Akun Baru</h2>
        <p class="subtitle">Mulai kelola catatan terstruktur Anda hari ini</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            
            <button type="submit" class="btn-submit">Daftar Sekarang</button>
        </form>

        <div class="login-link">
            Sudah punya akun? <a href="{% url 'login' %}">Masuk di sini</a>
        </div>
    </div>

</body>
</html>
